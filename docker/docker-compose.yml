version: '3.8'
services:
  guild-research:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - NATS_URL=nats://nats:4222
      - GUILD_PORT=8200
      - GUILD_NAME=research
    depends_on:
      - nats
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
